<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Card App</title>

<style>
body{
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
}

/* TITLE */
h1{
    margin-bottom: 20px;
    color: #111;
}

/* FORM */
.form-box{
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

input{
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    width: 150px;
}

button{
    padding: 10px 18px;
    border: none;
    background: #3b82f6;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover{
    background: #2563eb;
}

/* CARDS */
.container{
    margin-top: 25px;
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
}

/* CARD STYLE */
.card{
    background: white;
    width: 220px;
    padding: 15px;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover{
    transform: translateY(-5px);
}

/* IMAGE */
.card img{
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #3b82f6;
    margin-bottom: 10px;
}

/* TEXT */
.card h3{
    margin: 5px 0;
}

.card p{
    margin: 3px 0;
    color: #555;
}
</style>
</head>

<body>

<h1>Student Card App</h1>

<!-- FORM -->
<div class="form-box">
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="age" placeholder="Age">
    <input type="text" id="cls" placeholder="Class">
    <input type="text" id="img" placeholder="Image name (flowers.jpg)">
    <button onclick="addStudent()">Add Student</button>
</div>

<!-- CARDS -->
<div class="container" id="container"></div>

<script>
function addStudent(){

    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let cls = document.getElementById("cls").value;
    let img = document.getElementById("img").value;

    if(name === "" || age === "" || cls === "" || img === ""){
        alert("Please fill all fields");
        return;
    }

    // image same folder me hona chahiye
    let imgPath = img;

    let card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
        <img src="${imgPath}" alt="student">
        <h3>${name}</h3>
        <p>Age: ${age}</p>
        <p>Class: ${cls}</p>
    `;

    document.getElementById("container").appendChild(card);

    // clear inputs
    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("cls").value = "";
    document.getElementById("img").value = "";
}
</script>

</body>
</html>
