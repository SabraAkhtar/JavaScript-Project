<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

button{
    padding: 15px 35px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: white;
    color: #333;
    font-weight: bold;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
}

button:hover{
    transform: scale(1.05);
    background: #f1f1f1;
}

button:active{
    transform: scale(0.95);
}

h1{
    font-size: 80px;
    margin: 20px 0 0 0;
    color: #fff;
    text-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

h2{
    font-size: 40px;
    margin-top: 10px;
    letter-spacing: 2px;
    color: #f5f5f5;
}
    </style>
</head>
<body>
     <button>Click Me</button>
     <h1>0</h1>
     <h2>Head</h2>
</body>
<script>
    let headone=document.querySelector("h1")
    let head=document.querySelector("h2")
    let btn=document.querySelector("button")
    btn.addEventListener("click",()=>{
    let randomNumb=(Math.ceil(Math.random()*2))
    console.log(randomNumb)
     headone.textContent=randomNumb;
     if(randomNumb===1)
     {
      head.textContent="Tail"
     }
     else
     {
     head.textContent="Head"
     }
    });


</script>
</html>
