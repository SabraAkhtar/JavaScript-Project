<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Main Container */
        body > * {
            display: none;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Create a virtual container for styling */
        h1, h2, img, button {
            position: relative;
            z-index: 1;
        }

        /* Card wrapper styling using flex container */
        body {
            flex-direction: column;
            gap: 20px;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Card styling */
        h1, h2, img, .btn {
            display: block !important;
        }

        /* Create visual card effect */
        h1 {
            font-size: 42px;
            font-weight: 700;
            color: #0d7c7c;
            text-align: center;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: fadeIn 0.6s ease-out;
        }

        h2 {
            font-size: 64px;
            font-weight: 700;
            color: #0d7c7c;
            text-align: center;
            margin: 16px 0;
            line-height: 1;
            animation: slideUp 0.6s ease-out 0.1s both;
        }

        img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(13, 124, 124, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 16px 0;
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        img:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(13, 124, 124, 0.25);
        }

        .btn {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #0d7c7c 0%, #0a9a9a 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(13, 124, 124, 0.25);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            animation: slideUp 0.6s ease-out 0.3s both;
            font-family: 'Poppins', 'Inter', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(13, 124, 124, 0.35);
            background: linear-gradient(135deg, #0a9a9a 0%, #0d7c7c 100%);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(13, 124, 124, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            h1 {
                font-size: 32px;
            }

            h2 {
                font-size: 52px;
                margin: 12px 0;
            }

            img {
                width: 130px;
                height: 130px;
                border-radius: 14px;
            }

            .btn {
                padding: 12px 32px;
                font-size: 14px;
                border-radius: 10px;
            }
        }

        @media (max-width: 360px) {
            h1 {
                font-size: 28px;
            }

            h2 {
                font-size: 48px;
            }

            img {
                width: 120px;
                height: 120px;
            }

            .btn {
                padding: 10px 28px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
   <h1 id="text">SubhanAllah</h1>
   <h2>﷽                               </h2>
    <img>
     <button class="btn">INC</button>
    
    
</body>
<script>
    let headTwo=document.querySelector("h2")
     let head=document.querySelector("h1");
     let img=document.querySelector("img")
     let btn=document.querySelector(".btn")
       let num=0;
     btn.addEventListener("click",()=>{
    
      if(num <= 33)
      {
       num++;
      text.textContent = "SubhanAllah";
      headTwo.textContent=num;
       img.src = "subhan3.jpg";
      } 
      else if(num <= 66)
      {
        num++;
       text.textContent="AlhamduliLah"
       headTwo.textContent=num;
       img.src="alhamdu2.png";
      }
      else if(num <= 100)
      {
       num++;
       text.textContent="AllahuAkbar";
       headTwo.textContent=num;
       img.src="allahuakbar.png";
      }
      else{
        num=0;
      }
     });
</script>
</html>
