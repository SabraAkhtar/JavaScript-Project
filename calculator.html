<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       body {
    background: linear-gradient(135deg, #1e1e2f, #2a2a40);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
}

table {
    background: #ffa620;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

input[type="button"] {
    width: 60px;
    height: 60px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #333333;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

input[type="button"]:hover {
    background: #00adb5;
    transform: scale(1.1);
}

input[type="text"] {
    width: 95%;
    height: 50px;
    margin-bottom: 10px;
    text-align: right;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    padding: 10px;
}

    </style>
</head>
<body>
    <table>
        <tr>
            <th colspan="3"><input type="text" name="" id="a"></th>
            <th><input type="button" name="" id="" value="C" onclick="clr()"></th>
        </tr>
        <tr>
          <th><input type="button" name="" id="" value="1" onclick="pick(1)"></th>
           <th><input type="button" name="" id="" value="2" onclick="pick(2)"></th>
            <th><input type="button" name="" id="" value="3" onclick="pick(3)"></th>
             <th><input type="button" name="" id="" value="/" onclick="pick('/')"></th>
            </tr>
              <tr>
          <th><input type="button" name="" id="" value="4" onclick="pick(4)"></th>
           <th><input type="button" name="" id="" value="5" onclick="pick(5)"></th>
            <th><input type="button" name="" id="" value="6" onclick="pick(6)"></th>
             <th><input type="button" name="" id="" value="*" onclick="pick('*')"></th>
            </tr>
              <tr>
          <th><input type="button" name="" id="" value="7" onclick="pick(7)"></th>
           <th><input type="button" name="" id="" value="8" onclick="pick(8)"></th>
            <th><input type="button" name="" id="" value="9" onclick="pick(9)"></th>
             <th><input type="button" name="" id="" value="-" onclick="pick('-')"></th>
            </tr>
              <tr>
          <th><input type="button" name="" id="" value="." onclick="pick('.')"></th>
           <th><input type="button" name="" id="" value="0" onclick="pick(0)"></th>
            <th><input type="button" name="" id="" value="=" onclick="solve()"></th>
             <th><input type="button" name="" id="" value="+" onclick="pick('+')"></th>
            </tr>
        
     
    </table>
</body>
<script> function pick(val)
{
    document.getElementById("a").value += val;
}
function solve()
{
    let x= document.getElementById("a").value;
    let y=eval (x);
     document.getElementById("a").value=y;
}
function clr()
{
    document.getElementById("a").value = "";
}

</script>
</html>
